name: Build desktop apps

# Builds the Apex Debug Studio Electron app for both macOS and Windows on every push /
# pull request to the default branch (and on demand). Each OS job produces
# installable artifacts (macOS: .dmg + .zip, Windows: .exe (NSIS) + .zip) and
# uploads them so they can be downloaded from the run summary.
#
# On every push to main (never on PRs), the mac/win jobs also publish those
# same artifacts to the "v1.0.0" GitHub release under fixed, version-free
# filenames (see `artifactName` in package.json). splecdevelopers.com links
# to that fixed tag + fixed filenames, so this keeps the public download
# links always pointing at the newest main build with no manual step.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
            platform: mac
          - os: windows-latest
            name: Windows
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # electron-builder's DMG step shells out to `python`; GitHub's macOS
      # runners only ship `python3`, so make a plain `python` available.
      - name: Set up Python (for macOS dmg-builder)
        if: matrix.platform == 'mac'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # Prefer the reproducible, lockfile-exact install; fall back to a normal
        # install if the lockfile and the runner's npm disagree on a platform-specific
        # optional dependency (e.g. the Windows-only squirrel packages).
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
        shell: bash

      # Stamp a monotonically increasing version (1.0.<run_number>) on published
      # main builds ONLY. electron-updater decides "an update is available" by
      # comparing the version in latest.yml/latest-mac.yml against the running
      # app's version, so the number MUST increase each publish. The artifactName
      # filenames stay version-free (see package.json), so the fixed public
      # download links are unaffected — only the manifest's `version:` changes.
      - name: Stamp build version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm version "1.0.${GITHUB_RUN_NUMBER}" --no-git-tag-version --allow-same-version
        shell: bash

      # Decide whether we can produce a SIGNED + NOTARIZED macOS build. We can only
      # do that when the Apple signing secrets are present (they're absent on forks
      # and before the repo owner adds them), so we branch on that to avoid failing
      # the build. `enabled=true` only when the Developer ID cert secret exists.
      - name: Detect macOS signing availability
        if: matrix.platform == 'mac'
        id: macsign
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
        run: |
          if [ -n "$MAC_CSC_LINK" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets found — building signed + notarized."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No macOS signing secrets — building unsigned (auto-update install will be unavailable)."
          fi
        shell: bash

      - name: Build macOS app (signed + notarized)
        if: matrix.platform == 'mac' && steps.macsign.outputs.enabled == 'true'
        # Developer ID sign + notarize so Squirrel.Mac can self-install updates.
        # `-c.mac.notarize.teamId` turns on notarytool notarization; electron-builder
        # reads the Apple ID + app-specific password from the env below.
        run: npm run build -- --publish never -c.mac.notarize.teamId="$APPLE_TEAM_ID"
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash

      - name: Build macOS app (unsigned fallback)
        if: matrix.platform == 'mac' && steps.macsign.outputs.enabled != 'true'
        # --publish never: just build the artifacts, don't try to publish a
        # GitHub release (electron-builder auto-publishes when it detects CI,
        # which would require a GH_TOKEN we intentionally don't provide).
        run: npm run build -- --publish never
        env:
          # No Apple Developer certificate available — build unsigned instead of
          # failing on a missing identity. (In-app auto-update install won't work
          # for these builds; add the signing secrets to enable it.)
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows app
        if: matrix.platform == 'win'
        run: npx --no-install electron-builder --win --publish never
        env:
          # No Windows code-signing certificate on CI — build unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apex-debug-studio-${{ matrix.platform }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.blockmap
            dist/latest*.yml

      # Keep the public "v1.0.0" release's installers in sync with the newest
      # main build, using the fixed artifactName filenames so the download
      # links on splecdevelopers.com never need to change. Skipped on PRs and
      # forks so only vetted main commits get published.
      - name: Publish to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          # Installers + the electron-updater manifests/blockmaps. The mac job
          # produces latest-mac.yml, the win job latest.yml; each job uploads only
          # the files it actually built. The *.yml manifest is what the in-app
          # "Update" button reads to detect a newer build.
          files=(dist/*.dmg dist/*.zip dist/*.exe dist/latest*.yml dist/*.blockmap)
          gh release upload v1.0.0 "${files[@]}" --clobber --repo ${{ github.repository }}
        shell: bash

  publish-release-notes:
    name: Update release notes
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update v1.0.0 release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit v1.0.0 --repo ${{ github.repository }} --notes "Public desktop builds for Apex Debug Studio (macOS and Windows).

          This release is a rolling channel: every push to \`main\` rebuilds and republishes these same files, so the download links on splecdevelopers.com always serve the latest build.

          Auto-published from commit ${{ github.sha }} on $(date -u +'%Y-%m-%d %H:%M UTC')."
