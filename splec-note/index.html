<!doctype html>
<html lang="en" data-theme="light" data-theme-mode="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Splec Note</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div class="app">
      <header class="titlebar">
        <div class="titlebar-left">
          <div class="brand" title="Splec Note">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="brandStroke" x1="150" y1="120" x2="360" y2="400" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#9db4ff" />
                    <stop offset="1" stop-color="#7c5cff" />
                  </linearGradient>
                </defs>
                <path
                  d="M338 168 C300 132 232 130 204 160 C176 190 196 232 246 252 C306 276 332 308 318 344 C302 384 226 392 182 356"
                  fill="none" stroke="url(#brandStroke)" stroke-width="34"
                  stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </span>
            <span class="wordmark">
              <span class="wordmark-splec">Splec</span><span class="wordmark-note">Note</span>
            </span>
          </div>

          <div class="toolbar">
            <button id="act-new" class="tool-btn" type="button" title="New Note (Cmd/Ctrl+T)">New</button>
            <button id="act-open" class="tool-btn" type="button" title="Open… (Cmd/Ctrl+O)">Open</button>
            <button id="act-save" class="tool-btn" type="button" title="Save (Cmd/Ctrl+S)">Save</button>
          </div>
        </div>

        <div class="titlebar-actions">
          <div class="menu-wrap">
            <button id="menu-toggle" class="icon-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Menu">
              <span class="icon-slot" aria-hidden="true"></span>
            </button>
            <div id="app-menu" class="menu" role="menu" hidden>
              <button class="menu-item" data-act="new" role="menuitem">New Note<span class="menu-key">⌘T</span></button>
              <button class="menu-item" data-act="open" role="menuitem">Open…<span class="menu-key">⌘O</span></button>
              <button class="menu-item" data-act="save" role="menuitem">Save<span class="menu-key">⌘S</span></button>
              <button class="menu-item" data-act="saveAs" role="menuitem">Save As…<span class="menu-key">⇧⌘S</span></button>
              <button class="menu-item" data-act="close" role="menuitem">Close Tab<span class="menu-key">⌘W</span></button>
              <div class="menu-sep"></div>
              <button class="menu-item" data-act="newWindow" role="menuitem">New Window<span class="menu-key">⇧⌘N</span></button>
              <div class="menu-sep"></div>
              <div class="menu-label">Recent Files</div>
              <div id="menu-recent" class="menu-recent"></div>
              <div class="menu-sep"></div>
              <button class="menu-item" data-act="prefs" role="menuitem">Preferences…<span class="menu-key">⌘,</span></button>
            </div>
          </div>

          <button id="theme-toggle" class="icon-btn" type="button" aria-label="Toggle theme">
            <span class="icon-slot" aria-hidden="true"></span>
            <span id="theme-label" class="icon-btn-label">Light</span>
          </button>
        </div>
      </header>

      <div class="tabstrip-wrap">
        <div id="tabstrip" class="tabstrip" role="tablist"></div>
        <button id="tab-new" class="tab-new" type="button" title="New Note (Cmd/Ctrl+T)" aria-label="New note">+</button>
      </div>

      <main class="editor-wrap">
        <div id="editor" class="editor"></div>
        <div id="empty-state" class="empty-state" hidden></div>
      </main>

      <footer class="statusbar">
        <div class="status-left">
          <span class="status-brand">Splec&nbsp;Note</span>
          <span class="status-sep">·</span>
          <span id="status-msg">Ready</span>
        </div>
        <div class="status-right">
          <button id="wrap-toggle" class="status-btn" type="button" title="Toggle word wrap">Wrap: Off</button>
          <span class="status-sep">·</span>
          <span id="status-counts" class="status-counts">0 words</span>
          <span class="status-sep">·</span>
          <label class="lang-picker">
            <span class="lang-picker-label">Lang</span>
            <select id="lang-select" aria-label="Editor language"></select>
          </label>
          <span class="status-sep">·</span>
          <button id="encoding-btn" class="status-btn" type="button" title="Encoding">UTF-8</button>
          <button id="eol-btn" class="status-btn" type="button" title="Toggle line endings">LF</button>
          <span class="status-sep">·</span>
          <span id="cursor-pos" class="cursor-pos">Ln 1, Col 1</span>
        </div>
      </footer>
    </div>

    <div id="prefs-overlay" class="modal-overlay" hidden>
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="prefs-title">
        <div class="modal-head">
          <h2 id="prefs-title" class="modal-title">
            <span class="wordmark-splec">Splec</span> Preferences
          </h2>
          <button id="prefs-close" class="icon-btn" type="button" aria-label="Close">✕</button>
        </div>
        <div class="modal-body">
          <label class="field">
            <span class="field-label">Font size</span>
            <input id="pref-font" class="field-input" type="number" min="10" max="28" step="1" />
          </label>
          <label class="field">
            <span class="field-label">Tab size</span>
            <select id="pref-tab" class="field-input">
              <option value="2">2</option>
              <option value="4">4</option>
              <option value="8">8</option>
            </select>
          </label>
          <label class="field field-row">
            <span class="field-label">Word wrap</span>
            <input id="pref-wrap" type="checkbox" />
          </label>
          <label class="field">
            <span class="field-label">Default new-file language</span>
            <select id="pref-lang" class="field-input"></select>
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
